# Server Configuration
server.port=8080

# Memory Configuration for Large Excel Files
# These settings help prevent OutOfMemoryError
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# File upload settings - Increased for large Excel files
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# HTTP settings for large responses
server.tomcat.max-http-form-post-size=50MB
server.tomcat.max-swallow-size=50MB

# Logging
logging.level.com.example.excelcomparison=INFO
logging.level.org.springframework.web=DEBUG
